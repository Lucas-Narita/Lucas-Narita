name: Generate Snake Animation

# Builds the contribution-graph "snake" SVGs and publishes them to the
# `output` branch, where README.md references them via raw.githubusercontent.com.
on:
  # Refresh on a schedule so the snake keeps eating new contributions.
  schedule:
    - cron: "0 */12 * * *" # every 12 hours
  # Allow manual runs from the Actions tab.
  workflow_dispatch:
  # Regenerate whenever the default branch changes.
  push:
    branches:
      - main

# The GITHUB_TOKEN needs write access to push the generated SVGs to `output`.
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs from the contribution graph
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # Filenames MUST match the srcset paths in README.md.
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#70a5fd

      - name: Publish to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
